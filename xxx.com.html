<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RKX RAKIB | SYSTEM ANALYZER PRO</title>
    <style>
        /* Gaming & Tech Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@400;700;900&family=Russo+One&family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        /* Background Matrix Embers */
        .embers {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0000 0%, #000 80%);
            z-index: 1;
        }

        /* --- EXIT ANIMATION CLASS --- */
        .exit-mode {
            transform: translateY(-150vh) !important;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1) !important;
        }

        /* --- 1. DEVICE SYSTEM ANALYZER (TOP) --- */
        #system-panel {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 500px;
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-top: 3px solid #ff0000;
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-100px);
            animation: panel-drop 1s forwards 0.5s;
        }

        @keyframes panel-drop {
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
            color: #ff0000;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid rgba(255, 0, 0, 0.3);
            margin-bottom: 10px;
            padding-bottom: 5px;
            letter-spacing: 2px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 11px;
            color: #00ff00; /* Matrix Green */
        }

        .data-item { border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 2px; }
        .label { color: #ff9900; margin-right: 5px; }

        /* --- 2. MAIN CONTENT (CENTER) --- */
        #main-content {
            position: relative;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: transform 0.8s ease-in;
        }

        .crosshair {
            position: absolute;
            width: 120px; height: 120px;
            border: 2px solid rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            animation: target-lock 1.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes target-lock {
            0% { transform: scale(5); opacity: 0; }
            80% { transform: scale(1); opacity: 1; border-color: #ff0000; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .name-ariyan {
            font-family: 'Black Ops One', cursive;
            font-size: 4.5rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            opacity: 0;
            animation: slam-name 0.5s forwards 1.2s, glow-pulse 3s infinite ease-in-out 1.7s;
            text-align: center;
        }

        @keyframes slam-name {
            0% { transform: scale(5); opacity: 0; filter: blur(20px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 5px 5px 0px #ff0000; }
            50% { text-shadow: 5px 5px 0px #ff0000, 0 0 25px rgba(255,0,0,0.7); }
        }

        .ff-title {
            font-size: 1.4rem;
            color: #ffbd00;
            letter-spacing: 8px;
            margin-top: 10px;
            opacity: 0;
            animation: slide-in 0.5s forwards 1.7s;
        }

        @keyframes slide-in {
            from { transform: translateX(-100px); opacity: 0; }
            to { opacity: 1; transform: translateX(0); }
        }

        .version-tag {
            background: #ff0000;
            color: white;
            padding: 4px 20px;
            font-size: 0.9rem;
            margin-top: 20px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            opacity: 0;
            animation: fade-up 0.5s forwards 2.2s;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 3. RGB BUTTON (ORIGINAL) --- */
        #tap-wrapper {
            margin-top: 40px;
            opacity: 0;
            animation: fadeInBtn 0.8s forwards 3s;
            cursor: pointer;
        }

        @keyframes fadeInBtn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        .energy-btn { width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; position: relative; }

        .ring-outer {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid #fff; border-radius: 50%;
            animation: spin 2s linear infinite, rgb-lighting 3s linear infinite;
        }

        @keyframes rgb-lighting {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 15px #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }

        .ring-inner {
            position: absolute; width: 80%; height: 80%;
            border: 3px solid #fff; border-radius: 50%;
            animation: spin-reverse 1.5s linear infinite, rgb-lighting 3s linear infinite reverse;
        }

        .core {
            width: 65%; height: 65%;
            background: #000;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            border: 1px solid #fff;
            animation: pulse 1s infinite alternate;
        }

        .tap-text { color: #fff; font-size: 12px; font-family: 'Russo One'; text-align: center; text-transform: uppercase; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1.05); } }

    </style>
</head>
<body>

    <div class="embers"></div>

    <!-- Top System Panel -->
    <div id="system-panel">
        <div class="panel-header">CORE SYSTEM ANALYZER V2.0</div>
        <div class="data-grid">
            <div class="data-item"><span class="label">LOCATION:</span> <span id="loc">DHAKA, BD</span></div>
            <div class="data-item"><span class="label">TIME:</span> <span id="time-display">00:00:00</span></div>
            <div class="data-item"><span class="label">BATTERY:</span> <span id="bat-level">--%</span></div>
            <div class="data-item"><span class="label">STATUS:</span> <span id="bat-charge">--</span></div>
            <div class="data-item"><span class="label">RAM:</span> <span id="ram-info">--</span></div>
            <div class="data-item"><span class="label">OS VER:</span> <span id="os-info">--</span></div>
            <div class="data-item"><span class="label">BROWSER:</span> <span id="browser-info">--</span></div>
            <div class="data-item"><span class="label">SCREEN:</span> <span id="screen-info">--</span></div>
            <div class="data-item" style="grid-column: span 2;"><span class="label">NETWORK:</span> <span id="net-info">STABLE (4G/WIFI)</span></div>
        </div>
    </div>

    <!-- Main Intro Section -->
    <div id="main-content">
        <div class="crosshair"></div>
        
        <div class="text-box" id="text-box-main">
            <h1 class="name-ariyan">RKX RAKIB</h1>
            <h2 class="ff-title">WELCOME TO MY PROFILE</h2>
            <div class="version-tag">PROFILE V2.0</div>
        </div>

        <div id="tap-wrapper" onclick="exitAndRedirect()">
            <div class="energy-btn">
                <div class="ring-outer"></div>
                <div class="ring-inner"></div>
                <div class="core">
                    <div class="tap-text">VIEW MY<br>PROFILE</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://image2url.com/r2/default/audio/1770380186370-7891b55e-e401-418a-b9ac-79926d6eddad.mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bg-music');
        const systemPanel = document.getElementById('system-panel');
        const mainContent = document.getElementById('main-content');

        // 1. LIVE DHAKA TIME
        function updateTime() {
            const options = { timeZone: 'Asia/Dhaka', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('time-display').innerText = new Date().toLocaleTimeString('en-US', options);
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. BATTERY & CHARGING DATA
        if (navigator.getBattery) {
            navigator.getBattery().then(bat => {
                const refreshBat = () => {
                    document.getElementById('bat-level').innerText = Math.round(bat.level * 100) + "%";
                    document.getElementById('bat-charge').innerText = bat.charging ? "CHARGING" : "NOT CHARGING";
                };
                refreshBat();
                bat.onlevelchange = refreshBat;
                bat.onchargingchange = refreshBat;
            });
        }

        // 3. SYSTEM SPECIFICATIONS
        function fetchSpecs() {
            const ua = navigator.userAgent;
            
            // OS Detection
            let os = "Unknown OS";
            if (ua.indexOf("Android") > -1) os = "Android " + (ua.match(/Android\s([0-9\.]*)/) ? ua.match(/Android\s([0-9\.]*)/)[1] : "");
            else if (ua.indexOf("iPhone") > -1) os = "iOS (Apple)";
            document.getElementById('os-info').innerText = os;

            // Browser Detection
            let br = "Mobile Web";
            if (ua.indexOf("Chrome") > -1) br = "Chrome Engine";
            else if (ua.indexOf("Firefox") > -1) br = "Firefox";
            document.getElementById('browser-info').innerText = br;

            // RAM & Screen
            document.getElementById('ram-info').innerText = navigator.deviceMemory ? navigator.deviceMemory + " GB" : "N/A";
            document.getElementById('screen-info').innerText = window.screen.width + "x" + window.screen.height;

            // Connection
            if (navigator.connection) {
                document.getElementById('net-info').innerText = navigator.connection.effectiveType.toUpperCase() + " / " + navigator.connection.downlink + " Mbps";
            }
        }
        fetchSpecs();

        // 4. EXIT ANIMATION & REDIRECT
        function exitAndRedirect() {
            // Play music on interaction
            music.play().catch(e => {});

            // Trigger Fly-Up Animation
            systemPanel.classList.add('exit-mode');
            mainContent.classList.add('exit-mode');

            // Delay redirect until animation finished
            setTimeout(() => {
                window.location.href = "https://rkxrakib.vercel.app";
            }, 800);
        }

        console.log("%c [RKX SYSTEM READY] ", "background: red; color: #fff; font-weight: bold; padding: 10px;");
    </script>
</body>
</html>
